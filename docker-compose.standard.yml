# Jamswap as a STANDARD JAM service — the whole DEX reaches the chain through the
# published JAMNP-S network protocol (work-packages over CE-133/QUIC), not a
# lasair-specific operator API. This is the "realistic scenario":
#
#   trader order ─► DEX UI (offchain) ─HTTP─► jamnp-builder ─CE-133/QUIC─►
#                                     lasair-node guarantor ─► refine ─► accumulate
#                                     ─► on-chain state ─► UI reads it back over RPC
#
#   docker compose -f docker-compose.standard.yml up --build      # UI on :8080
#
# Unlike docker-compose.yml (which PULLS a published HTTP-only node), this BUILDS the
# lasair node image from the sibling lasair checkout, because the CE-133 guarantor +
# builder daemon are new (not yet in a published tag). The node image carries BOTH the
# node binary and the builder daemon; the `builder` service runs the same image with the
# builder entrypoint.
#
# Roles:
#   lasair-node : JAM node — HTTP operator RPC (:19900, deploy + storage reads) AND the
#                 JAMNP-S guarantor (CE-133 on udp/40100, refine -> accumulate).
#   builder     : the standard work-package builder — HTTP /submit (:19980) in, CE-133 out.
#   dex         : jamswap off-chain round builder + trading UI (:8080). BUILDER_URL routes
#                 every on-chain write through CE-133; deploy + reads stay on the node RPC.

x-genesis: &genesis "a1b2c3d4"      # shared genesis tag -> ALPN jamnp-s/0/a1b2c3d4 (chain isolation)

services:
  lasair-node:                      # JAM node: operator RPC + JAMNP-S guarantor
    build:
      context: ../lasair            # sibling submodule; the new guarantor/builder live here
      dockerfile: Dockerfile.node
    image: lasair-node:standard     # built once here; reused by the `builder` service
    environment:
      LASAIR_NODE_PORT: "19900"     # HTTP operator RPC
      LASAIR_BUILDER_PORT: "40100"  # JAMNP-S guarantor CE-133 (UDP) — enabling it makes this a guarantor
      LASAIR_QUIC_BIND: "0.0.0.0"   # bind routable so the builder container can reach the guarantor
      LASAIR_JAMNP_GENESIS_HEX: *genesis
    ports:
      - "19900:19900"               # RPC exposed to the host for poking; CE-133 stays on the compose net
    restart: unless-stopped

  builder:                          # the standard work-package builder daemon
    image: lasair-node:standard     # same image, built by lasair-node above
    entrypoint: ["/usr/local/bin/jamnp-builder"]
    environment:
      LASAIR_BUILDER_HTTP_PORT: "19980"
      LASAIR_GUARANTOR_HOST: lasair-node
      LASAIR_GUARANTOR_PORT: "40100"
      LASAIR_JAMNP_GENESIS_HEX: *genesis
      LASAIR_NODE_RPC: http://lasair-node:19900   # fetch each service's code hash to commit to
    depends_on:
      lasair-node:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:19980/healthz"]
      interval: 5s
      timeout: 3s
      start_period: 5s
      retries: 12
    restart: unless-stopped

  dex:                              # off-chain round builder + trading UI
    build:
      context: .
      dockerfile: offchain/Dockerfile
    depends_on:
      lasair-node:
        condition: service_healthy
      builder:
        condition: service_healthy
    environment:
      LASAIR_RPC: http://lasair-node:19900     # deploy + storage reads
      BUILDER_URL: http://builder:19980         # <-- work-items go over CE-133 (the standard path)
      JAM: /work/jamswap-service.jam
      PORT: "8080"
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./offchain:/app:ro
      - ./service/jamswap-service.jam:/work/jamswap-service.jam:ro
    working_dir: /app
    command: ["python3", "server.py"]
    ports:
      - "8080:8080"
    restart: unless-stopped
