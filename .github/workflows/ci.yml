name: CI

# The determinism/conservation gate (PLAN.md §5): the matching engine's property
# tests — value conservation, byte-identical determinism, per-order bounds, and
# settlement Σ-deltas == 0 — plus the engine scenario tests, the auth (ed25519 +
# canonical-message) unit tests, and the round-lifecycle tests (sealed-order
# carry-forward / reveal-on-cross) must pass on every push. The service must also
# always compile. Never regress. Full test map: docs/TESTING.md.

on:
  push:
  pull_request:

jobs:
  match-engine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Test the matching engine + auth (incl. property tests)
        run: cargo test --release
        working-directory: crates/match-engine

  service-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Compile the JAM service (settlement, sealed rounds, signed ops)
        run: cargo build --release
        working-directory: service

  offchain-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Syntax-check the off-chain builder + demo
        run: |
          python3 -m py_compile offchain/server.py offchain/round.py offchain/treasury.py offchain/clearing.py offchain/deploy.py sim/demo.py
      - name: Round-lifecycle tests (sealed-order carry-forward / reveal-on-cross)
        run: python3 -m unittest discover -s offchain/tests -v
