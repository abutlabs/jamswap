global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  # PolkaJam is a black box: the exporter derives its metrics from container
  # logs + the bestBlock RPC (see monitor/exporter.py).
  - job_name: jam-mixed
    static_configs:
      - targets: ["exporter:9105"]

  # lasair >=1.6.4 is natively instrumented: every node serves Prometheus
  # /metrics itself (--metrics-port, on by default in the mesh entrypoint).
  - job_name: lasair
    static_configs:
      - targets: ["lm3:9615"]
        labels: { node: lm3, client: lasair }
      - targets: ["lm4:9615"]
        labels: { node: lm4, client: lasair }
      - targets: ["lm5:9615"]
        labels: { node: lm5, client: lasair }

  # The jamswap SERVICE layer (docs/OBSERVABILITY_PLAN.md phase 1):
  # dex = API + submit->settle ledger (headline: jamswap_settle_latency_seconds);
  # builder = per-guarantor CE-133 fan-out outcomes; canary = the 5-min e2e probe.
  - job_name: jamswap
    static_configs:
      - targets: ["dex:8080"]
        labels: { component: dex }
      - targets: ["builder:19980"]
        labels: { component: builder }
      - targets: ["canary:9110"]
        labels: { component: canary }

  # offered load, measured from OUTSIDE the system under test (docker-compose.load.yml
  # / k8s/loadgen.yaml). Target absent unless a load test is running.
  - job_name: loadgen
    static_configs:
      - targets: ["loadgen:9111"]
        labels: { component: loadgen }
