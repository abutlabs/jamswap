# Run the Jamswap DEX end-to-end — one command, NO lasair source needed:
#
#   docker compose up                   # -> single-node dev harness + trading UI :8080
#   docker compose --profile demo run --rm demo   # the narrated CLI scenario
#
# For a REAL 6-validator JAM testnet (consensus, TCP gossip, leader rotation, 6s slots)
# instead of this single-node harness, use the sibling compose file:
#   docker compose -f docker-compose.testnet.yml up      # -> 6 validators + UI :8080
#
# The JAM node is pulled as a published multi-arch image (ghcr.io/abutlabs/lasair-node),
# so this runs natively on amd64 AND arm64 (Apple Silicon) — see README "Run it".
# It deploys the Jamswap service onto that node and serves the off-chain builder +
# trading UI: place orders, run an auction round, watch the uniform-price clearing +
# balances. See docs/ARCHITECTURE.md.
#
# Pin a version instead of :latest with  LASAIR_NODE_TAG=0.4.2 docker compose up
# (GHCR image tags strip the git-tag prefix: lasair tag node-v0.4.2 -> image tag 0.4.2)

services:
  lasair-node:                        # the JAM client, pulled (not built) — any arch
    image: ghcr.io/abutlabs/lasair-node:${LASAIR_NODE_TAG:-latest}
    ports:
      - "19900:19900"
    restart: unless-stopped

  dex:                              # off-chain builder API + trading UI
    # Built (not pulled) so the encrypt-until-batch committee sidecar (Rust) ships inside the
    # image; COMMITTEE_BIN is baked in => sealed orders use option 2 (no reveal round). The
    # build compiles the committee binary once (arkworks) then runs the stdlib-only Python server.
    build:
      context: .
      dockerfile: offchain/Dockerfile
    depends_on:
      lasair-node:
        condition: service_healthy
    # The UI server DEPLOYS the service itself on startup and uses the id the node
    # assigns — so it always points at the right service even if the node is reused
    # across runs (sequential ids would otherwise drift 1729 -> 1730 -> ...).
    environment:
      LASAIR_RPC: http://lasair-node:19900
      JAM: /work/jamswap-service.jam
      PORT: "8080"
      PYTHONUNBUFFERED: "1"           # so the "deployed -> service id N" line shows in `docker compose logs`
      # ENC_MODE: "0"                 # uncomment to force commit-reveal (option 3) instead
    volumes:
      - ./offchain:/app:ro            # live-edit the server; the committee binary lives in /usr/local/bin
      - ./service/jamswap-service.jam:/work/jamswap-service.jam:ro
    working_dir: /app
    command: ["python3", "server.py"]
    ports:
      - "8080:8080"
    restart: unless-stopped

  demo:                             # the narrated CLI scenario (opt-in profile)
    image: python:3-slim
    profiles: ["demo"]
    depends_on:
      lasair-node:
        condition: service_healthy
    environment:
      LASAIR_RPC: http://lasair-node:19900
      JAM: /work/jamswap-service.jam
    volumes:
      - ./service/jamswap-service.jam:/work/jamswap-service.jam:ro
      - ./sim/demo.py:/work/demo.py:ro
    command: ["python3", "/work/demo.py"]
    restart: "no"
