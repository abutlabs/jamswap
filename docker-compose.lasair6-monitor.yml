# Monitoring overlay for the ALL-LASAIR coherent net. Adds Prometheus + Grafana
# onto the SAME project/network as docker-compose.lasair6.yml, so they scrape the
# dex, builder and the six lm nodes by service DNS on `lasnet`. Grafana opens on
# the accounts & trading board (per-dev-account balances, pricing, mempool, order
# funnel, failures, clearing SLO) — the live view onto the DEX while the fuzzer runs.
#
#   docker compose -p lasair6 \
#     -f docker-compose.lasair6.yml -f docker-compose.lasair6-monitor.yml \
#     up -d prometheus grafana
#   # Grafana: http://localhost:3000  (anonymous admin, no login)
#   # Prometheus: http://localhost:9090
#
# Host ports are the standard 3000/9090 — this is the primary DEX dashboard. If the
# MIXED net's monitor (project jamswap) is also running it will collide on these
# ports; stop its grafana/prometheus first (the mixed net cannot settle trades, so
# its accounts dashboard is misleading — this all-lasair net is the real one).
#
# The dashboards/provisioning are the same ones the mixed net uses; the panels that
# reference PolkaJam (jam_pj_*, client="polkajam") simply show "No data" here — the
# jamswap_* and lasair_* panels are fully populated.

services:
  prometheus:
    image: prom/prometheus:v3.4.1
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    volumes:
      - ./monitor/prometheus.lasair6.yml:/etc/prometheus/prometheus.yml:ro
    ports: ["9090:9090"]
    networks: { lasnet: {} }
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.6.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/jamswap-accounts.json
    volumes:
      - ./monitor/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitor/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports: ["3000:3000"]
    depends_on: [prometheus]
    networks: { lasnet: {} }
    restart: unless-stopped
