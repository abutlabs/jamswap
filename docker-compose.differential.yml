# MIXED-CLIENT DIFFERENTIAL RIG — one jamswap blob, independent JAM clients, one verdict.
#
#   docker compose -f docker-compose.differential.yml up --build --abort-on-container-exit
#
# What this IS: the same service/jamswap-service.jam deployed to a lasair node AND a
# PolkaJam local testnet (public binary, GP 0.7.2 — same graypaper version as lasair),
# driven through the identical trustless scenario (owner-signed registration, deposit,
# an in-refine-verified signed order, then a FORGED order), with the resulting on-chain
# state compared BYTE-FOR-BYTE. Any divergence = a conformance bug in one client.
# First green run: 2026-07-04 (signed order rests identically; forgery rejected by both).
#
# What this is NOT (yet): a shared consensus network. lasair's testnet gossips over its
# own TCP protocol while PolkaJam speaks standard JAMNP-S over QUIC — mixing clients in
# ONE network is gated on lasair's JAMNP-S implementation (M2/M3 work), not on compose
# plumbing. When that lands, this file's lanes merge into one chain.
#
# TurboJam lane (r2rationality/turbojam, C++): intentionally NOT wired yet — it is
# source-build-only and its work-item/operator interface is unverified. The natural
# integration is the same pattern as below once verified: build its Dockerfile, deploy
# the same blob, run the same driver scenario, compare bytes. Placeholder tracked in
# docs/DIFFERENTIAL_TESTNET.md.
#
# Compliance: the PolkaJam binary is fetched from the PUBLIC paritytech/polkajam-releases
# at image-build time and never committed (black-box use only — see lasair
# docs/DISCLOSURES.md). Pin it: PJ_RELEASE=nightly-2026-07-04 docker compose ... up

services:
  lasair-node:                        # lane 1: our client, pulled multi-arch
    image: ghcr.io/abutlabs/lasair-node:${LASAIR_NODE_TAG:-latest}
    ports:
      - "19900:19900"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:19900/v1/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 24

  polkajam-diff:                      # lane 2: PolkaJam testnet + the differential driver
    build:
      context: .
      dockerfile: differential/Dockerfile.polkajam
      args:
        PJ_RELEASE: ${PJ_RELEASE:-nightly-2026-07-04}
    depends_on:
      lasair-node:
        condition: service_healthy
    environment:
      LASAIR_RPC: http://lasair-node:19900
