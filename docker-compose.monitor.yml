# Monitoring overlay for the MIXED network: Prometheus + Grafana + a tiny exporter
# that turns what the clients actually expose (lasair stdout logs via the Docker API,
# PolkaJam's bestBlock RPC) into metrics. Always used WITH the mixed compose file:
#
#   docker compose -f docker-compose.mixed.yml -f docker-compose.monitor.yml up -d --build
#   # or: make monitor            ->  Grafana on http://localhost:3000 (no login)
#
# The exporter mounts the Docker socket READ-ONLY to tail container logs — local
# dev tooling only; don't ship this overlay anywhere multi-tenant.

services:
  exporter:
    build:
      context: .
      dockerfile: monitor/Dockerfile
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      COMPOSE_PROJECT: jamswap
      PJ_RPC: http://172.28.0.10:19890
    networks: { mixnet: {} }
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.4.1
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    volumes:
      - ./monitor/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports: ["9090:9090"]
    depends_on: [exporter]
    networks: { mixnet: {} }
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.6.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/jam-mixed.json
    volumes:
      - ./monitor/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitor/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports: ["3000:3000"]
    depends_on: [prometheus]
    networks: { mixnet: {} }
    restart: unless-stopped
