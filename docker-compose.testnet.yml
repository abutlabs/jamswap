# Run Jamswap on a REAL 6-validator JAM testnet (not the single-node dev harness):
#
#   docker compose -f docker-compose.testnet.yml up      # -> trading UI at http://localhost:8080
#
# This swaps the single `lasair-node` (immediate local execution) for six
# `lasair-testnet-node` validators running actual JAM consensus: **real TCP block
# gossip, wall-clock leader rotation, 6 s slots, STF import** — PolkaJam-style. Every
# order is included in a gossiped block and each validator re-executes `refine`
# (the matching engine) and `accumulate` (settlement) byte-identically. The image is
# purpose-built for a 6-validator set (its baked genesis defines exactly six), so the
# validator count is fixed at 6 — NODE_INDEX runs 0..5.
#
# Each validator is configured entirely by env:
#   NODE_INDEX  this validator's index in the set (0..5)
#   NODES       the full 6-entry gossip peer list host:port (same list for every node;
#               a node finds itself by NODE_INDEX). Gossip is on :20000, internal to
#               this compose network.
#   RPC_PORT    the operator RPC each node serves (deploy service / submit work-item /
#               read storage) — the same HTTP API the single-node harness exposes.
#
# The dex points at validator v0's RPC; v0 is the only node that publishes a port.
# Pin a version with  LASAIR_NODE_TAG=0.2.1 docker compose -f docker-compose.testnet.yml up
# (GHCR image tags strip the git-tag prefix: lasair tag testnet-v0.2.1 -> image tag 0.2.1)

x-nodes: &nodes "v0:20000,v1:20000,v2:20000,v3:20000,v4:20000,v5:20000"

x-validator: &validator
  image: ghcr.io/abutlabs/lasair-testnet-node:${LASAIR_NODE_TAG:-latest}
  restart: unless-stopped
  healthcheck:
    test: ["CMD-SHELL", "curl -fsS http://localhost:19900/v1/healthz || exit 1"]
    interval: 5s
    timeout: 3s
    retries: 24
    start_period: 5s

services:
  v0:
    <<: *validator
    environment: { NODE_INDEX: "0", NODES: *nodes, RPC_PORT: "19900" }
    ports:
      - "19900:19900"          # v0's operator RPC — reachable by the dex and the host
  v1:
    <<: *validator
    environment: { NODE_INDEX: "1", NODES: *nodes, RPC_PORT: "19900" }
  v2:
    <<: *validator
    environment: { NODE_INDEX: "2", NODES: *nodes, RPC_PORT: "19900" }
  v3:
    <<: *validator
    environment: { NODE_INDEX: "3", NODES: *nodes, RPC_PORT: "19900" }
  v4:
    <<: *validator
    environment: { NODE_INDEX: "4", NODES: *nodes, RPC_PORT: "19900" }
  v5:
    <<: *validator
    environment: { NODE_INDEX: "5", NODES: *nodes, RPC_PORT: "19900" }

  dex:                          # off-chain builder API + trading UI, pointed at v0
    image: python:3-slim
    depends_on:
      v0: { condition: service_healthy }
      v1: { condition: service_healthy }
      v2: { condition: service_healthy }
      v3: { condition: service_healthy }
      v4: { condition: service_healthy }
      v5: { condition: service_healthy }
    environment:
      LASAIR_RPC: http://v0:19900
      JAM: /work/jamswap-service.jam
      PORT: "8080"
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./offchain:/app:ro
      - ./service/jamswap-service.jam:/work/jamswap-service.jam:ro
    working_dir: /app
    command: ["python3", "server.py"]
    ports:
      - "8080:8080"
    restart: unless-stopped
