# Jamswap on a MIXED-CLIENT JAM chain — lasair AND PolkaJam validators co-author
# ONE Safrole-rotating chain, leadership rotating ACROSS clients.
#
#   LASAIR_IMAGE=lasair:local docker compose -f docker-compose.mixed.yml up
#   # or, once the image is published:
#   docker compose -f docker-compose.mixed.yml up
#
# Six validators (tiny config), split across two independent JAM client
# implementations, all on one shared genesis:
#   pj0,pj1,pj2  PolkaJam validators (indices 0,1,2)   — fetched black-box, built locally
#   lm3,lm4,lm5  lasair validators (indices 3,4,5) — pulled multi-arch from GHCR
# `spec-init` mints the shared genesis first (identical bytes for both clients);
# every node then authors ONLY its own slots and imports the rest over spec
# JAMNP-S/QUIC. `watch` prints the chain advancing across both clients.
#
# Every node has a STATIC IP on the `mixnet` network because PolkaJam's gen-spec
# encodes validator addresses numerically; the same IPs are baked into the shared
# genesis by spec-init. Multi-arch: lasair is a published multi-arch image;
# the PolkaJam image is built locally, fetching the linux-<arch> release for your
# machine (aarch64 or x86_64).
#
# Verify the flagship claim (both clients authored one chain, agreeing on state):
#   docker compose -f docker-compose.mixed.yml logs lm3 lm4 lm5 | grep -E "authored|STATUS"
#   docker compose -f docker-compose.mixed.yml logs watch          # the rotation summary

x-polkajam: &polkajam
  build:
    context: .
    dockerfile: mixed/Dockerfile.polkajam
    args:
      MESH_IMAGE: ${LASAIR_IMAGE:-ghcr.io/abutlabs/lasair:1.8.0}
      PJ_RELEASE: ${PJ_RELEASE:-nightly-2026-07-14}
  image: jamswap-pj-mixed:local
  restart: unless-stopped
  volumes: [ "shared:/shared" ]

x-mesh: &mesh
  image: ${LASAIR_IMAGE:-ghcr.io/abutlabs/lasair:1.8.0}
  restart: unless-stopped
  volumes:
    - "shared:/shared"
    - "./service/jamswap-service.jam:/work/jamswap-service.jam:ro"

services:
  # 1) mint the shared genesis both clients load (runs once, then exits 0)
  spec-init:
    <<: *polkajam
    restart: "no"
    environment:
      ROLE: init
      SHARED: /shared
      LAYOUT: ${LAYOUT:-polkajam,polkajam,polkajam,lasair,lasair,lasair}
      SERVICE: /work/jamswap-service.jam   # seeded into the SHARED genesis (both clients)
      SERVICE_ID: "100"
    volumes:
      - "shared:/shared"
      - "./service/jamswap-service.jam:/work/jamswap-service.jam:ro"
    networks: { mixnet: {} }

  # 2) PolkaJam validators (indices 0,1,2)
  pj0:
    <<: *polkajam
    depends_on: { spec-init: { condition: service_completed_successfully } }
    environment: { ROLE: validator, INDEX: "0", SHARED: /shared }
    networks: { mixnet: { ipv4_address: 172.28.0.10 } }
    ports:
      - "19890:19890"             # v0 RPC, for the watcher / host debugging
      - "40060:40060/udp"         # v0 JAMNP-S/QUIC — lets the host-side lasair_follow
                                  # observer re-execute this net's blocks (gamma_s
                                  # catcher, lasair docs/FINALITY_PLAN.md Phase 0)
  pj1:
    <<: *polkajam
    depends_on: { spec-init: { condition: service_completed_successfully } }
    environment: { ROLE: validator, INDEX: "1", SHARED: /shared }
    networks: { mixnet: { ipv4_address: 172.28.0.11 } }
  pj2:
    <<: *polkajam
    depends_on: { spec-init: { condition: service_completed_successfully } }
    environment: { ROLE: validator, INDEX: "2", SHARED: /shared }
    networks: { mixnet: { ipv4_address: 172.28.0.12 } }

  # 3) lasair validators (indices 3,4,5). Each reads /shared/peers_<OWN>.txt (written
  #    by spec-init with every peer's runtime peer_id) and applies the JAMNP-S
  #    Preferred Initiator: one side of each pair dials, so links never churn. The
  #    PEERS env below is the id-less fallback used only if that file is missing.
  lm3:
    <<: *mesh
    depends_on: { spec-init: { condition: service_completed_successfully } }
    environment:
      SPEC: /shared/spec.json
      OWN: "3"
      # ALL THREE lm nodes are guarantors the builder fans CE-133 out to. A
      # guarantee needs >=2 validators assigned to one core; each lm node authors
      # only as its own index but legitimately derives all lasair dev-account
      # seeds, so it signs guarantees as the full lasair set {3,4,5} — with C=2
      # cores and 3 lasair validators, >=2 always share a core (pigeonhole).
      # Whichever lm node authors on the WINNING branch reports the package, and
      # ANY later lm-authored block assures every report pending in the state it
      # extends (assure-any-pending) — so the availability dance completes at the
      # combined lasair authoring rate (~1/2 on the equal split), not one node's 1/6.
      GUARANTOR_OWN: "3,4,5"
      IDENTITY: "103"
      SERVICE: /work/jamswap-service.jam
      SERVICE_ID: "100"
      PORT: "40063"
      PEERS: "172.28.0.10:40060,172.28.0.11:40061,172.28.0.12:40062,172.28.0.14:40064,172.28.0.15:40065"
      INTERVAL: "1"
      WALL: "1"
    networks: { mixnet: { ipv4_address: 172.28.0.13 } }
  lm4:
    <<: *mesh
    depends_on: { spec-init: { condition: service_completed_successfully } }
    environment:
      SPEC: /shared/spec.json
      OWN: "4"
      GUARANTOR_OWN: "3,4,5"
      IDENTITY: "104"
      SERVICE: /work/jamswap-service.jam
      SERVICE_ID: "100"
      PORT: "40064"
      PEERS: "172.28.0.10:40060,172.28.0.11:40061,172.28.0.12:40062,172.28.0.13:40063,172.28.0.15:40065"
      INTERVAL: "1"
      WALL: "1"
    networks: { mixnet: { ipv4_address: 172.28.0.14 } }
  lm5:
    <<: *mesh
    depends_on: { spec-init: { condition: service_completed_successfully } }
    environment:
      SPEC: /shared/spec.json
      OWN: "5"
      GUARANTOR_OWN: "3,4,5"
      IDENTITY: "105"
      SERVICE: /work/jamswap-service.jam
      SERVICE_ID: "100"
      PORT: "40065"
      PEERS: "172.28.0.10:40060,172.28.0.11:40061,172.28.0.12:40062,172.28.0.13:40063,172.28.0.14:40064"
      INTERVAL: "1"
      WALL: "1"
    networks: { mixnet: { ipv4_address: 172.28.0.15 } }

  # 4) watcher: prints the chain advancing on a PolkaJam node (both clients build
  #    one chain; lasair-authored blocks are re-derived by PolkaJam to the same root)
  watch:
    <<: *polkajam
    depends_on: [pj0]
    environment: { ROLE: watch, SHARED: /shared }
    networks: { mixnet: {} }
    entrypoint: ["bash","-c"]
    command:
      - |
        for _ in $$(seq 1 90); do [ -s /shared/ready ] && break; sleep 1; done
        echo "watching the mixed chain on pj0 RPC ..."
        last=""
        while true; do
          bb=$$(curl -s -m3 -X POST -H 'content-type: application/json' \
             -d '{"jsonrpc":"2.0","id":1,"method":"bestBlock","params":[]}' http://172.28.0.10:19890 2>/dev/null)
          slot=$$(echo "$$bb" | python3 -c "import sys,json;d=json.load(sys.stdin)['result'];print('slot',d['slot'],'head',d['header_hash'][:16])" 2>/dev/null || echo "...booting")
          [ "$$slot" != "$$last" ] && { echo "chain: $$slot"; last="$$slot"; }
          sleep 2
        done

  # 5) jamswap on the MIXED chain: the same QUIC-only DEX as the default compose,
  #    but the chain is the six-validator lasair+PolkaJam network. The service is
  #    seeded into the SHARED genesis by spec-init; every lm node hosts its CE-133
  #    builder endpoint (guaranteeing on its own slots). The ALPN embeds the
  #    per-genesis hash, so the bridges read it from /shared/genesis_hex.
  builder:
    image: ${LASAIR_IMAGE:-ghcr.io/abutlabs/lasair:1.8.0}
    depends_on: { spec-init: { condition: service_completed_successfully } }
    volumes: [ "shared:/shared" ]
    entrypoint: ["bash", "-c"]
    command:
      - |
        for _ in $$(seq 1 60); do [ -s /shared/genesis_hex ] && break; sleep 1; done
        export LASAIR_JAMNP_GENESIS_HEX=$$(cat /shared/genesis_hex)
        exec /usr/local/bin/jamnp-builder
    environment:
      # fan CE-133 out to ALL lasair nodes (each one's builder endpoint = PORT+1):
      # whichever lm node next authors on the winning branch reports the package
      LASAIR_GUARANTOR_HOST: 172.28.0.13,172.28.0.14,172.28.0.15
      LASAIR_GUARANTOR_PORT: "40064,40065,40066"
      LASAIR_NODE_RPC: ""
      LASAIR_BUILDER_HTTP_PORT: "19980"
    networks: { mixnet: {} }
    restart: unless-stopped

  reader:
    image: ${LASAIR_IMAGE:-ghcr.io/abutlabs/lasair:1.8.0}
    depends_on: { spec-init: { condition: service_completed_successfully } }
    volumes: [ "shared:/shared" ]
    entrypoint: ["bash", "-c"]
    command:
      - |
        for _ in $$(seq 1 60); do [ -s /shared/genesis_hex ] && break; sleep 1; done
        export LASAIR_JAMNP_GENESIS_HEX=$$(cat /shared/genesis_hex)
        exec /usr/local/bin/lasair-reader
    environment:
      LASAIR_NODE_HOST: 172.28.0.13        # any lasair node serves CE-129
      LASAIR_NODE_PORT: "40063"
      LASAIR_READER_HTTP_PORT: "19990"
    networks: { mixnet: {} }
    restart: unless-stopped

  dex:
    build:
      context: .
      dockerfile: offchain/Dockerfile
    depends_on: [builder, reader]
    environment:
      SERVICE_ID: "100"
      BUILDER_URL: http://builder:19980
      READER_URL: http://reader:19990
      PORT: "8080"
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./offchain:/app:ro
      - ./service/jamswap-service.jam:/work/jamswap-service.jam:ro
    working_dir: /app
    command: ["python3", "server.py"]
    ports:
      - "8090:8080"    # host 8090 (8080 is taken by a local app); in-network peers
                       # still reach the dex on dex:8080 by service DNS
    networks: { mixnet: {} }
    restart: unless-stopped

networks:
  mixnet:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24

volumes:
  shared:
